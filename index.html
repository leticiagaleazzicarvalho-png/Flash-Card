<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Flashcard Interativo</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="container">
        <div class="flashcard">
            
            <div class="face frente">
                <h2>O que é HTML?</h2>
                <p>Passe o mouse para ver a resposta</p>
            </div>
            
            <div class="face verso">
                <h2>Resposta:</h2>
                <p>É uma linguagem de marcação utilizada para construir a estrutura e o esqueleto de uma página web.</p>
            </div>

        </div>
    </div>

</body>
</html>
